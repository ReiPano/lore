services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hybrid-search-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # LORE_QDRANT_DATA is the canonical var; HYBRID_QDRANT_DATA kept as alias.
      - ${LORE_QDRANT_DATA:-${HYBRID_QDRANT_DATA:-./.data/qdrant}}:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
